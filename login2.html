<!DOCTYPE html>
<html>
<head>

<title>SHOPKRO – Login</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Inter';
}

body{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;

  
  background:
    linear-gradient(
      rgba(90,24,154,0.75),
      rgba(123,44,191,0.75)
    ),
    url("fast.jpg");   

  background-size:cover;
  background-position:center;
  background-repeat:no-repeat;
}

.login-box{
  width:380px;
  padding:35px;
  border-radius:22px;
  background:rgba(255,255,255,0.92);
  backdrop-filter:blur(10px);
  box-shadow:0 20px 40px rgba(0,0,0,0.35);
  text-align:center;
}

.login-box h2{
  margin-bottom:20px;
  color:#5a189a;
  font-weight:800;
}

.login-box input{
  width:100%;
  padding:13px;
  margin-bottom:14px;
  border-radius:12px;
  border:1px solid #ccc;
  outline:none;
}

.login-box input:focus{
  border-color:#7b2cbf;
  box-shadow:0 0 0 3px rgba(123,44,191,0.15);
}

.login-box button{
  width:100%;
  padding:13px;
  border:none;
  border-radius:12px;
  background:#7b2cbf;
  color:white;
  font-size:16px;
  font-weight:700;
  cursor:pointer;
}

.login-box button:hover{
  background:#5a189a;
}

.login-box p{
  margin-top:15px;
  font-size:14px;
}

.login-box a{
  color:#7b2cbf;
  text-decoration:none;
  font-weight:600;
}
</style>
</head>

<body>

<div class="login-box">
  <h2>Login to SHOPKRO</h2>

  <form>
    <input type="email" placeholder="Email" required>
    <input type="password" placeholder="Password" required>
    <button type="submit">Login</button>
  </form>

  <p>New user? <a href="#">Create Account</a></p>
</div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SHOPKRO – Smart Grocery</title>

<style>
:root{
  --primary:#7b2cbf;
  --secondary:#5a189a;
  --accent:#ffd166;
  --bg:#f2f1f7;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Segoe UI',sans-serif;
}

body{
  background:linear-gradient(180deg,#f7f5fb,#ece9f6);
  color:#222;
}

/* HEADER */
header{
  position:sticky;
  top:0;
  z-index:100;
  background:linear-gradient(135deg,var(--primary),var(--secondary));
  padding:15px 25px;
  display:flex;
  align-items:center;
  gap:15px;
  box-shadow:0 8px 25px rgba(0,0,0,0.2);
}

header h1{
  color:white;
  font-size:1.8;
  letter-spacing:1px;
}

header input{
  flex:1;
  padding:12px 18px;
  border-radius:30px;
  border:none;
  outline:none;
  font-size:0.95rem;
}

/* HERO */
.hero{
  margin:20px;
  padding:35px;
  border-radius:25px;
  background:linear-gradient(120deg,#9d4edd,#7b2cbf);
  color:white;
  display:flex;
  justify-content:space-between;
  align-items:center;
  box-shadow:0 15px 35px rgba(0,0,0,0.25);
}

.hero h2{
  font-size:2.2rem;
}

.hero p{
  margin-top:10px;
  opacity:0.9;
}

/* PRODUCTS */
.container{
  max-width:1200px;
  margin:auto;
  padding:20px;
}

.products{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(190px,1fr));
  gap:25px;
}

.product{
  background:rgba(255,255,255,0.75);
  backdrop-filter:blur(12px);
  border-radius:20px;
  padding:15px;
  box-shadow:0 12px 25px rgba(0,0,0,0.15);
  transition:all 0.35s ease;
  position:relative;
}

.product:hover{
  transform:translateY(-8px) scale(1.03);
  box-shadow:0 20px 40px rgba(0,0,0,0.25);
}

.product img{
  width:100%;
  height:130px;
  object-fit:contain;
  margin-bottom:10px;
}

.product h3{
  font-size:0.95rem;
  margin-bottom:6px;
}

.price{
  font-weight:bold;
  color:#333;
}

/* OFFER BADGE */
.badge{
  position:absolute;
  top:12px;
  left:12px;
  background:linear-gradient(135deg,#ff4d6d,#ff006e);
  color:white;
  padding:4px 10px;
  font-size:0.7rem;
  border-radius:20px;
}

/* BUTTON */
.product button{
  width:100%;
  margin-top:10px;
  padding:9px;
  border:none;
  border-radius:25px;
  background:linear-gradient(135deg,var(--primary),var(--secondary));
  color:white;
  cursor:pointer;
  font-size:0.9rem;
  transition:0.3s;
}

.product button:hover{
  opacity:0.9;
}

/* CART */
.cart{
  position:fixed;
  bottom:20px;
  right:20px;
  width:280px;
  background:rgba(255,255,255,0.85);
  backdrop-filter:blur(12px);
  border-radius:20px;
  padding:15px;
  box-shadow:0 15px 35px rgba(0,0,0,0.25);
}

.cart h2{
  color:var(--primary);
  margin-bottom:10px;
}

.cart ul{
  list-style:none;
  max-height:160px;
  overflow-y:auto;
  font-size:0.85rem;
}

.cart h3{
  margin:10px 0;
  text-align:right;
}

.cart button{
  width:100%;
  background:linear-gradient(135deg,#2e7d32,#1b5e20);
  color:white;
  border:none;
  padding:10px;
  border-radius:25px;
  cursor:pointer;
}

/* MOBILE */
@media(max-width:600px){
  .hero{
    flex-direction:column;
    text-align:center;
    gap:15px;
  }
}
</style>
</head>

<body>

<header>
  <h1>SHOPKRO</h1>
  <input type="text" placeholder="Search groceries in 10 minutes...">
</header>

<div class="hero">
  <div>
    <h2>Fast Grocery Delivery</h2>
    <p>Fresh items • Best prices • Doorstep delivery</p>
  </div>
</div>

<div class="container">
  <div class="products" id="products"></div>
</div>

<div class="cart">
  <h2>🛒 Your Cart</h2>
  <ul id="cartItems"></ul>
  <h3>Total ₹<span id="total">0</span></h3>
  <button onclick="placeOrder()">Checkout</button>
  <button onclick="placeOrder()" class="btn">Place Order</button>

</div>


</body>
</html>

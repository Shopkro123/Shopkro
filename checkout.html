<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Checkout – SHOPKRO</title>

<style>
body{
  font-family:Inter,sans-serif;
  background:linear-gradient(135deg,#7b2cbf,#5a189a);
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.checkout-box{
  background:white;
  width:420px;
  padding:30px;
  border-radius:20px;
  box-shadow:0 15px 30px rgba(0,0,0,.3);
}

h2{
  color:#7b2cbf;
  text-align:center;
  margin-bottom:20px;
}

.info{
  background:#f3e8ff;
  padding:15px;
  border-radius:12px;
  margin-bottom:20px;
}

button{
  width:100%;
  padding:14px;
  background:#7b2cbf;
  border:none;
  border-radius:12px;
  color:white;
  font-size:16px;
  font-weight:700;
  cursor:pointer;
}

button:hover{
  background:#5a189a;
}
</style>
</head>

<body>

<div class="checkout-box">
  <h2>Checkout</h2>

  <div class="info">
    <p><strong>Shop:</strong> <span id="shopName"></span></p>
    <p><strong>Distance:</strong> <span id="shopDistance"></span></p>
    <p><strong>Delivery:</strong> 10–15 minutes</p>
  </div>
<button onclick="goToPayment()">Proceed to Payment</button>

  </div>

<script>
const shop = localStorage.getItem("shopName");
const distance = localStorage.getItem("shopDistance");

if(!shop){
  window.location.href = "nearbyshop.html";
}

document.getElementById("shopName").innerText = shop;
document.getElementById("shopDistance").innerText = distance;

function goToPayment(){
  window.location.href = "payment.html";
}
</script>

</body>
</html>
